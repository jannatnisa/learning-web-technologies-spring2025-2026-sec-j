<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
 
<style>
body{
text-align:center;
font-family:Arial;
}
 
.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin-top:20px;
}
 
.cell{
width:100px;
height:100px;
border:2px solid black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
 
button{
margin-top:20px;
padding:10px 20px;
}
</style>
 
</head>
 
<body>
 
<h2>Tic Tac Toe Game</h2>
 
<p id="status">Current Player: X</p>
 
<div class="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>
 
<button onclick="resetGame()">Reset Game</button>
 
<script>
 
let cells = document.querySelectorAll(".cell")
let currentPlayer = "X"
let gameOver = false
 
let winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]
 
cells.forEach(function(cell,index){
 
cell.addEventListener("click",function(){
 
if(cell.innerText != "" || gameOver){
return
}
 
cell.innerText = currentPlayer
 
checkWinner()
 
if(!gameOver){
if(currentPlayer == "X"){
currentPlayer = "O"
}else{
currentPlayer = "X"
}
 
document.getElementById("status").innerText = "Current Player: " + currentPlayer
}
 
})
 
})
 
function checkWinner(){
 
for(let i=0;i<winPatterns.length;i++){
 
let a = winPatterns[i][0]
let b = winPatterns[i][1]
let c = winPatterns[i][2]
 
if(
cells[a].innerText != "" &&
cells[a].innerText == cells[b].innerText &&
cells[a].innerText == cells[c].innerText
){
document.getElementById("status").innerText = "Winner: " + cells[a].innerText
gameOver = true
return
}
 
}
 
let draw = true
 
cells.forEach(function(cell){
if(cell.innerText == ""){
draw = false
}
})
 
if(draw){
document.getElementById("status").innerText = "It's a Draw!"
gameOver = true
}
 
}
 
function resetGame(){
 
cells.forEach(function(cell){
cell.innerText = ""
})
 
currentPlayer = "X"
gameOver = false
 
document.getElementById("status").innerText = "Current Player: X"
 
}
 
</script>
 
</body>
</html>
